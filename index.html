<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIX Tech - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="auth-container" id="loginView">
        <div class="logo-placeholder">ai</div>
        <h3>ARCANE INNOVATION TECH</h3>
        <h2>WELCOME TO AIX!</h2>
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="loginUsername" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" required>
        </div>
        <button class="btn-primary" onclick="attemptLogin()">Log In</button>
        
        <div class="link-text">
            <a href="#" onclick="switchView('recoveryView')">Forgot Password? Click Here</a><br><br>
            New Here? <a href="#" onclick="switchView('registerView')">Register Now</a>
        </div>
    </div>

    <div class="auth-container hidden" id="registerView">
        <div class="logo-placeholder">ai</div>
        <h3>ARCANE INNOVATION TECH</h3>
        <h2>WELCOME TO AIX!</h2>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" required>
        </div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="regUsername" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" required>
        </div>
        <button class="btn-primary" onclick="attemptRegister()">Register Now</button>
        
        <div class="link-text">
            Already have an Account? <a href="#" onclick="switchView('loginView')">Login</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
