<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIX Tech - Password Recovery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-wrapper">

    <div class="auth-container">
        <div class="logo-sidebar" style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; margin-bottom: 30px; margin-top: 10px;">
            <svg width="120" height="55" viewBox="0 0 120 55" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: block;">
                <text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle" fill="var(--primary-color)" font-size="46" font-weight="900" font-family="'Segoe UI', Tahoma, sans-serif" letter-spacing="-2">aix</text>
                <circle cx="102" cy="15" r="5" fill="var(--primary-color)"/>
            </svg>
            <span style="font-size: 11px; font-weight: bold; letter-spacing: 1.5px; color: var(--primary-color); margin-top: 2px; text-transform: uppercase;">
                Arcane Innovation Tech
            </span>
        </div>
        
        <h3 style="margin-bottom: 15px; margin-top: 0;">Password Recovery</h3>
        <p style="font-size: 14px; margin-bottom: 25px;">
            Enter your registered email address. We will generate a secure recovery link.
        </p>
        
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="recoveryEmail" placeholder="name@aixtech.com" required>
        </div>
        
        <button class="btn-primary" onclick="requestReset()">
            Send Recovery Link
        </button>
        
        <div class="link-text" style="text-align: center; margin-top: 20px;">
            <a href="login.html">← Return to Sign In</a>
        </div>
    </div>

    <script>
        function requestReset() {
            const email = document.getElementById('recoveryEmail').value;
            if (!email) {
                alert("Please enter a valid email address.");
                return;
            }

            fetch('http://localhost:5291/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ Email: email })
            })
            .then(async response => {
                const data = await response.json();
                if (response.ok) {
                    console.log("RESET LINK GENERATED:", data.resetLink);
                    alert("Success! For this local test, your password reset link has been generated.\n\nCheck your browser console (F12) to click the direct link!");
                } else {
                    alert("Error: " + (data.message || "Email not found in the system."));
                }
            })
            .catch(err => console.error("Recovery request failed:", err));
        }
    </script>
</body>
</html>
